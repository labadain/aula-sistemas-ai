name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build static site from Markdown
        run: |
          python -m pip install --upgrade pip markdown
          python - <<'PY'
          from pathlib import Path
          import os
          import html
          import shutil
          import markdown

          src_root = Path('.')
          out_root = Path('_site')

          if out_root.exists():
            shutil.rmtree(out_root)
          out_root.mkdir(parents=True, exist_ok=True)
          (out_root / '.nojekyll').write_text('', encoding='utf-8')

          skip_parts = {'.git', '.github', '_site'}

          def should_skip(path: Path) -> bool:
            return any(part in skip_parts for part in path.parts)

          css_rel = Path('assets/css/markdown.css')
          css_target = out_root / css_rel
          css_target.parent.mkdir(parents=True, exist_ok=True)
          css_target.write_text('''body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f7f4ee;
            color: #13212f;
          }
          .page-shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1rem 3rem;
          }
          .page-nav {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
          }
          .page-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.7rem 1rem;
            border-radius: 999px;
            border: 1px solid #c7d3e0;
            background: #ffffff;
            color: #0b3b6e;
            text-decoration: none;
            font-weight: 600;
          }
          .page-nav a:hover {
            background: #eef4fb;
          }
          main {
            margin: 0;
          }
          article {
            background: #fffdf8;
            border: 1px solid #d6ccbc;
            border-radius: 12px;
            padding: 1.25rem;
          }
          a { color: #006d77; }
          pre { overflow-x: auto; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #d6ccbc; padding: 0.4rem 0.5rem; text-align: left; }
          code { background: #f1ece0; padding: 0.12rem 0.3rem; border-radius: 4px; }
          ''', encoding='utf-8')

          def page_template(title: str, body_html: str, css_href: str, home_href: str, program_href: str) -> str:
            return f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>{html.escape(title)}</title>
            <link rel="stylesheet" href="{css_href}" />
          </head>
          <body>
            <div class="page-shell">
              <nav class="page-nav" aria-label="Page navigation">
                <a href="{home_href}">Home</a>
                <a href="{program_href}">Program</a>
              </nav>
              <main>
                <article>
                  {body_html}
                </article>
              </main>
            </div>
          </body>
          </html>
          '''

          for path in src_root.rglob('*'):
            if path.is_dir() or should_skip(path):
              continue

            relative = path.relative_to(src_root)
            target = out_root / relative
            target.parent.mkdir(parents=True, exist_ok=True)

            if path.suffix.lower() == '.md':
              md_text = path.read_text(encoding='utf-8')
              rendered = markdown.markdown(
                md_text,
                extensions=['tables', 'fenced_code', 'sane_lists', 'toc'],
                output_format='html5'
              )
              title = path.stem
              html_target = target.with_suffix('.html')
              css_href = os.path.relpath(css_target, html_target.parent).replace(os.sep, '/')
              home_href = os.path.relpath(out_root / 'index.html', html_target.parent).replace(os.sep, '/')
              program_href = os.path.relpath(out_root / 'modules.html', html_target.parent).replace(os.sep, '/')
              html_page = page_template(title, rendered, css_href, home_href, program_href)
              html_target.write_text(html_page, encoding='utf-8')
            elif path.suffix.lower() == '.html' and path.name != 'index.html':
              continue
            else:
              shutil.copy2(path, target)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
