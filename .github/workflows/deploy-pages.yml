name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build static site from Markdown
        run: |
          python -m pip install --upgrade pip markdown
          python - <<'PY'
          from pathlib import Path
          import html
          import shutil
          import markdown

          src_root = Path('.')
          out_root = Path('_site')

          if out_root.exists():
            shutil.rmtree(out_root)
          out_root.mkdir(parents=True, exist_ok=True)

          skip_parts = {'.git', '.github', '_site'}

          def should_skip(path: Path) -> bool:
            return any(part in skip_parts for part in path.parts)

          def page_template(title: str, body_html: str) -> str:
            return f'''<!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>{html.escape(title)}</title>
            <style>
              body {{
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: #f7f4ee;
                color: #13212f;
              }}
              main {{
                max-width: 900px;
                margin: 2rem auto;
                padding: 0 1rem 3rem;
              }}
              article {{
                background: #fffdf8;
                border: 1px solid #d6ccbc;
                border-radius: 12px;
                padding: 1.25rem;
              }}
              a {{ color: #006d77; }}
              pre {{ overflow-x: auto; }}
              table {{ border-collapse: collapse; width: 100%; }}
              th, td {{ border: 1px solid #d6ccbc; padding: 0.4rem 0.5rem; text-align: left; }}
              code {{ background: #f1ece0; padding: 0.12rem 0.3rem; border-radius: 4px; }}
            </style>
          </head>
          <body>
            <main>
              <article>
                {body_html}
              </article>
            </main>
          </body>
          </html>
          '''

          for path in src_root.rglob('*'):
            if path.is_dir() or should_skip(path):
              continue

            relative = path.relative_to(src_root)
            target = out_root / relative
            target.parent.mkdir(parents=True, exist_ok=True)

            if path.suffix.lower() == '.md':
              md_text = path.read_text(encoding='utf-8')
              rendered = markdown.markdown(
                md_text,
                extensions=['tables', 'fenced_code', 'sane_lists', 'toc'],
                output_format='html5'
              )
              title = path.stem
              html_page = page_template(title, rendered)
              html_target = target.with_suffix('.html')
              html_target.write_text(html_page, encoding='utf-8')
            else:
              shutil.copy2(path, target)
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
